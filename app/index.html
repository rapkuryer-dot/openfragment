<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/of-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light only" />
    <meta name="theme-color" content="#ffffff" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #fff;
      }
      #root {
        min-height: 100vh;
      }
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #fff;
      }
      #root:empty::after {
        content: '';
        width: 32px;
        height: 32px;
        border: 3px solid rgba(0, 152, 234, 0.2);
        border-top-color: #0098ea;
        border-radius: 50%;
        animation: of-boot-spin 0.7s linear infinite;
      }
      @keyframes of-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      .of-boot-error {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 24px;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        text-align: center;
        color: #0a0a0b;
      }
      .of-boot-error-title {
        margin: 0;
        font-size: 1.125rem;
        font-weight: 700;
      }
      .of-boot-error-msg {
        margin: 0;
        max-width: 360px;
        font-size: 0.875rem;
        color: #6b7280;
      }
      .of-boot-error-btn {
        margin-top: 8px;
        padding: 10px 20px;
        border: none;
        border-radius: 999px;
        background: #0098ea;
        color: #fff;
        font-size: 0.9375rem;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
    <title>OPENFRAGMENT</title>
    <meta name="description" content="OPENFRAGMENT" />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=general-sans@400,500,600,700&f[]=switzer@300,400,500,600,700&f[]=cabinet-grotesk@500,700,800&display=swap"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
